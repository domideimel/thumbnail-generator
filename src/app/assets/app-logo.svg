<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <filter id="small-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>

    <clipPath id="thumb-clip">
      <rect x="110" y="160" width="280" height="180" rx="20"/>
    </clipPath>
  </defs>

  <g id="angular-shield">
    <path fill="#DD0031" d="M250,30 L30,105 L65,390 L250,470 L435,390 L470,105 Z"/>
    <path fill="#C3002F" d="M250,30 L250,470 L435,390 L470,105 Z"/>
  </g>

  <g id="sparkles" fill="#FFCA28">
    <path d="M 390 90 Q 410 90 410 70 Q 410 90 430 90 Q 410 90 410 110 Q 410 90 390 90 Z"/>
    <path d="M 430 130 Q 440 130 440 120 Q 440 130 450 130 Q 440 130 440 140 Q 440 130 430 130 Z"/>
    <path d="M 70 380 Q 85 380 85 365 Q 85 380 100 380 Q 85 380 85 395 Q 85 380 70 380 Z"/>
    <path d="M 120 120 Q 130 120 130 110 Q 130 120 140 120 Q 130 120 130 130 Q 130 120 120 120 Z"/>
  </g>

  <rect x="110" y="160" width="280" height="180" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>

  <g clip-path="url(#thumb-clip)">
    <rect x="110" y="160" width="280" height="180" fill="#FFFFFF"/>

    <rect x="250" y="195" width="140" height="145" fill="#F9F9F9"/>

    <rect x="110" y="160" width="280" height="35" fill="#E8EAED"/>

    <circle cx="128" cy="177.5" r="5" fill="#FF5F56"/>
    <circle cx="145" cy="177.5" r="5" fill="#FFBD2E"/>
    <circle cx="162" cy="177.5" r="5" fill="#27C93F"/>

    <rect x="180" y="168" width="140" height="19" rx="9" fill="#FFFFFF"/>

    <circle cx="170" cy="230" r="24" fill="#FFCA28"/>
    <path fill="#D0D0D0" d="M 200 350 L 280 230 L 390 350 Z"/>
    <path fill="#E0E0E0" d="M 80 350 L 170 250 L 250 350 Z"/>
  </g>

  <g id="play-button" filter="url(#small-shadow)">
    <rect x="210" y="222" width="80" height="56" rx="12" fill="#FF0000"/>
    <polygon points="240,237 240,263 264,250" fill="#FFFFFF"/>
  </g>
</svg>
