<svg height="100%" viewBox="0 0 500 500" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter height="120%" id="shadow" width="120%" x="-10%" y="-10%">
      <feDropShadow dx="0" dy="10" flood-color="#000000" flood-opacity="0.2" stdDeviation="12"/>
    </filter>
    <filter height="140%" id="small-shadow" width="140%" x="-20%" y="-20%">
      <feDropShadow dx="0" dy="5" flood-color="#000000" flood-opacity="0.25" stdDeviation="6"/>
    </filter>

    <clipPath id="thumb-clip">
      <rect height="180" rx="20" width="280" x="110" y="160"/>
    </clipPath>
  </defs>

  <g id="angular-shield">
    <path d="M250,30 L30,105 L65,390 L250,470 L435,390 L470,105 Z" fill="#DD0031"/>
    <path d="M250,30 L250,470 L435,390 L470,105 Z" fill="#C3002F"/>
  </g>

  <g fill="#FFCA28" id="sparkles">
    <path d="M 390 90 Q 410 90 410 70 Q 410 90 430 90 Q 410 90 410 110 Q 410 90 390 90 Z"/>
    <path d="M 430 130 Q 440 130 440 120 Q 440 130 450 130 Q 440 130 440 140 Q 440 130 430 130 Z"/>
    <path d="M 70 380 Q 85 380 85 365 Q 85 380 100 380 Q 85 380 85 395 Q 85 380 70 380 Z"/>
    <path d="M 120 120 Q 130 120 130 110 Q 130 120 140 120 Q 130 120 130 130 Q 130 120 120 120 Z"/>
  </g>

  <rect fill="#FFFFFF" filter="url(#shadow)" height="180" rx="20" width="280" x="110" y="160"/>

  <g clip-path="url(#thumb-clip)">
    <rect fill="#FFFFFF" height="180" width="280" x="110" y="160"/>

    <rect fill="#F9F9F9" height="145" width="140" x="250" y="195"/>

    <rect fill="#E8EAED" height="35" width="280" x="110" y="160"/>

    <circle cx="128" cy="177.5" fill="#FF5F56" r="5"/>
    <circle cx="145" cy="177.5" fill="#FFBD2E" r="5"/>
    <circle cx="162" cy="177.5" fill="#27C93F" r="5"/>

    <rect fill="#FFFFFF" height="19" rx="9" width="140" x="180" y="168"/>

    <circle cx="170" cy="230" fill="#FFCA28" r="24"/>
    <path d="M 200 350 L 280 230 L 390 350 Z" fill="#D0D0D0"/>
    <path d="M 80 350 L 170 250 L 250 350 Z" fill="#E0E0E0"/>
  </g>

  <g filter="url(#small-shadow)" id="play-button">
    <rect fill="#FF0000" height="56" rx="12" width="80" x="210" y="222"/>
    <polygon fill="#FFFFFF" points="240,237 240,263 264,250"/>
  </g>
</svg>
